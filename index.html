<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ext-iptv Player</title>
    
    <!-- Tailwind CSS (Estilos) -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- HLS.js (Motor de Streaming) -->
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

    <style>
        /* Estilos personalizados para ocultar scrollbars y animaciones */
        textarea::-webkit-scrollbar { width: 0px; }
        
        .channel-card { transition: all 0.2s ease; cursor: pointer; }
        .channel-card:hover { transform: scale(1.02); border-color: #3b82f6; background: #1e293b; }
        
        /* Animación suave para la barra de estado */
        @keyframes pulse-green {
            0%, 100% { opacity: 1; }
            50% { opacity: .7; }
        }
        .animate-pulse-slow { animation: pulse-green 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
    </style>
</head>
<body class="bg-gray-900 text-white font-sans h-screen flex flex-col overflow-hidden">

    <!-- HEADER -->
    <div class="bg-gray-800 p-3 border-b border-gray-700 flex justify-between items-center shrink-0 z-10">
        <h1 class="text-lg font-bold bg-clip-text text-transparent bg-gradient-to-r from-blue-400 to-purple-500">
            ext-iptv
        </h1>
        <div class="flex flex-col gap-1.5 w-64">
    
            
            <a href="https://kewsito.github.io/" target="_blank" class="flex items-center gap-2 text-xs text-gray-400 hover:text-blue-400 transition-colors group">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 group-hover:text-blue-500" fill="currentColor" viewBox="0 0 24 24">
                    <path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.93 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.312.833 1.123.833 2.246v3.09c0 .319.193.694.802.576 4.765-1.589 8.199-6.086 8.199-11.388 0-6.627-5.373-12-12-12z"/>
                </svg>
                <span class="hidden sm:inline">Desarrollado por: Kewsito</span>
            </a>
        </div>
        <div class="flex gap-2 text-xs text-gray-400 items-center">
            <span id="status-badge" class="bg-green-900 px-3 py-1 rounded-full text-green-300 animate-pulse-slow">
                🟢 Listo
            </span>
        </div>
    </div>

    <!-- CONTENEDOR PRINCIPAL -->
    <div class="flex flex-col md:flex-row h-[calc(100vh-42px)] w-full overflow-hidden">
        
        <!-- PANEL IZQUIERDO: Lista y Editor -->
        <div class="w-full md:w-1/3 border-r border-gray-700 flex flex-col bg-gray-850">
            
            <!-- Área de Textura / Editar Lista -->
            <div class="p-4 shrink-0 border-b border-gray-700 flex flex-col h-[25%]">
                <label class="block text-xs text-blue-300 font-bold mb-1 uppercase tracking-wider flex justify-between">
                    <span>Editor de Lista (.m3u/.m3u8)</span>
                    <span id="line-count" class="text-gray-400 text-[10px] ml-2">Líneas: 0</span>
                </label>
                <textarea 
                    id="iptvList" 
                    class="w-full h-full bg-gray-900 border border-gray-700 rounded text-green-500 font-mono text-[10px] resize-none focus:ring-2 ring-blue-500 outline-none p-2 overflow-y-auto custom-scrollbar"
                    placeholder="#EXTINF:-1 tvg-logo='logo.png',nombre del canal http://servidor/live.m3u8" >https://raw.githubusercontent.com/Kewsito/lista-deportes-argentina/refs/heads/main/lista.m3u8</textarea>
                
                <div class="mt-2 flex gap-2">
                    <!-- ID para conectar con el JS -->
                    <button id="btn-load-list" class="bg-blue-600 hover:bg-blue-500 text-white text-xs font-bold py-1.5 px-4 rounded transition shadow-lg shadow-blue-900/30 w-full flex justify-center items-center gap-2">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12" />
                        </svg>
                        Cargar Lista
                    </button>
                </div>
            </div>

            <!-- VISUALIZADOR DE CANALES (GRILLA) -->
            <div id="channels-container" class="flex-1 overflow-y-auto p-2 bg-gray-900 relative">
                
                <!-- Estado Inicial / Error -->
                <div id="empty-state" class="absolute inset-0 flex flex-col items-center justify-center text-gray-500 p-6 text-center opacity-70 transition-opacity duration-300">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-16 w-16 mb-3 text-gray-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M19.428 15.428a2 2 0 00-1.022-.547l-2.384-.477a6 6 0 00-3.86.517l-.318.158a6 6 0 01-3.86.517L6.05 15.21a2 2 0 00-1.806.547M8 4h8l-1 1v5.172a2 2 0 00.586 1.414l5 5c1.26 1.26.367 3.414-1.415 3.414H4.828c-1.782 0-2.674-2.154-1.414-3.414l5-5A2 2 0 009 10.172V5L8 4z" />
                    </svg>
                    <span class="text-sm text-gray-400">Pega la lista arriba y pulsa "Cargar Lista".</span>
                </div>

            </div>
        </div>

        <!-- PANEL DERECHO: Reproductor -->
        <div class="w-full md:w-2/3 bg-black flex items-center justify-center relative shrink-0">
            
            <div id="player-wrapper" class="relative w-full h-full shadow-inner">
                <video 
                    id="main-video" 
                    class="w-full h-full object-contain bg-black"
                    controls autoplay muted playsinline>
                    <p class="text-white p-4 text-center text-sm">Selecciona un canal de la lista para reproducir</p>
                </video>
            </div>
            
            <!-- Info del canal actual -->
            <div class="absolute bottom-0 left-0 w-full bg-gradient-to-t from-black/90 to-transparent p-2 pointer-events-none">
                <span id="current-channel-name" class="text-sm text-white font-bold tracking-wide block truncate max-w-full pr-4">Esperando selección...</span>
            </div>
        </div>

    </div>

    <!-- SCRIPT DE LÓGICA (Cargar desde archivo externo) -->
    <script src="iptv-player.js" type="module"></script>
</body>
</html>
